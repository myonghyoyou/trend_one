services:
  postgres:
    image: postgres:15
    container_name: trend-one-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trend_one_dev}
      POSTGRES_USER: ${POSTGRES_USER:-trend_one}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trend_one_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - trend-one-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trend-one-postgres-data:
