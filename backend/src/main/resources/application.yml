server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 90m
      cookie:
        http-only: true
        same-site: lax

spring:
  application:
    name: trend-one-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trend_one}
    username: ${DB_USERNAME:trend_one}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:/mappers/trendone/**/*.xml
  type-aliases-package: com.trendone.govtrend
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  session:
    attribute-name: sessionExists
  login:
    id: ${LOGIN_ID:}
    password: ${LOGIN_PASSWORD:}
    dev:
      enabled: ${DEV_LOGIN_ENABLED:false}
      id: ${DEV_LOGIN_ID:}
      password: ${DEV_LOGIN_PASSWORD:}
