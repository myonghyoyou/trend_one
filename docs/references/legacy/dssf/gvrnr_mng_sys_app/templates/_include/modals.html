{% load static %}

<!-- Alert Modal -->
<div class="modal fade" id="modalAlert" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalAlertTitleErr">
        	<img src="{% static '/img/err00.png' %}" class="simplePopupIcon" id="alertImgErr" style="width:25px;height:25px;margin-right:15px;">
        </h5>
        <h5 class="modal-title" id="modalAlertTitleSucc">
        	<img src="{% static '/img/succ00.png' %}" class="simplePopupIcon" id="alertImgSucc" style="width:25px;height:25px;margin-right:15px;">
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onClick="closeAlert();">
        </button>
      </div>
      <div class="modal-body text-center" id="modalAlertBody">
        ...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" id="modalAlertBtnErr" onClick="closeAlert();">확인</button>
        <button type="button" class="btn btn-primary" id="modalAlertBtnSucc" onClick="closeAlert();">확인</button>
      </div>
    </div>
  </div>
</div>
      
<!-- Confirm Modal -->
<div class="modal fade" id="modalCnfrm" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalCnfrmTitle">
        	<img src="{% static '/img/alt00.png' %}" class="simplePopupIcon" id="alertImgErr" style="width:25px;height:25px;margin-right:15px;">
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onClick="closeConfirm();">
        </button>
      </div>
      <div class="modal-body text-center p-5" id="modalCnfrmBody">
      </div>
      <div class="text-center mb-30">
        <button type="button" class="btn btn-primary" data-dismiss="modal" onClick="closeConfirm();">취소</button>
        <button type="button" class="btn btn-primary ml-5" data-dismiss="modal" id="btnConfirm" onClick="okConfirm();">확인</button>
        <br>
        <br>
      </div>
    </div>
  </div>
</div>

<!-- Image Modal -->
<div id="modalBigImg" style="position:fixed;top:0px;background:#000000;width:100%;height:100%;z-index:1100;background-color: rgba( 0, 0, 0, 0.2 );display:none;" >
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" onClick="closeBigImg();">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="modalBigImgBody" style="border:0px solid #000000;padding:0px 15px 15px 15px;">
        <img id="modalBigImgSrc" src="" style="width:100%;">
      </div>
      <div class="text-center mb-30">
        <button type="button" class="btn btn-primary" onClick="closeBigImg();">확인</button>
        <br>
        <br>
      </div>
    </div>
  </div>
</div>

<!-- Audio Modal -->
<div id="modalAdoPlyr" style="position:fixed;top:0px;background:#000000;width:100%;height:100%;z-index:1100;background-color: rgba( 0, 0, 0, 0.2 );display:none;" >
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" onClick="closeAdo();">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="modalBigImgBody" style="border:0px solid #000000;padding:0px 15px 15px 15px;">
        <audio id="modalAdoSrc" src="" controls="" autoplay=""  preload="auto" style="width:95%;border:0px;margin:0px;"></audio>
      </div>
      <div class="text-center mb-30">
        <button type="button" class="btn btn-primary" onClick="closeAdo();">확인</button>
        <br>
        <br>
      </div>
    </div>
  </div>
</div>
